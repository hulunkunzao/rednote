spring:
  application:
    name: rednote

  datasource:
    url: jdbc:mysql://localhost:3306/rednote?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.rednote.model
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    root: warn
    com.example.rednote: debug
  pattern:
    console: "-----------------%n%d{HH:mm:ss} | %highlight(%-4level) | %-15.15thread | %logger |%n%msg%n-----------------%n"

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: "仿小红书项目接口文档"
      paths-to-match: "/**"
      packages-to-scan: com.example.rednote.controller
  override-with-generic-response: false

knife4j:
  enable: true
  production: false
  setting:
    language: zh_cn
    enable-version: true
    enable-swagger-models: true
    swagger-model-name: 实体类列表

jwt:
  secret: your-secure-32-character-secret-key-here
  expiration: 86400000 # 24 小时

minio:
  endpoint: ${MINIO_ENDPOINT}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket-name: ${MINIO_BUCKET}
